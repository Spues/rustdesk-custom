name: Build RustDesk Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive  # 初始化子模块
      
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop
      
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      
    - name: Install dependencies
      run: |
        flutter doctor
        cd flutter
        flutter pub get
        
    - name: Build Rust Core
      run: cargo build --release
      
    - name: Build Windows EXE
      run: |
        cd flutter
        flutter build windows --release
        
    - name: Package artifact
      run: |
        cd flutter/build/windows/x64/Release
        7z a -tzip rustdesk-windows.zip Runner/
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: rustdesk-windows-exe
        path: flutter/build/windows/x64/Release/rustdesk-windows.zip
        
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: flutter/build/windows/x64/Release/rustdesk-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
